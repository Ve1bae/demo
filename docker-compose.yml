services:
  srs:
    image: ossrs/srs:5
    container_name: hangyin-srs
    restart: unless-stopped
    ports:
      - "1935:1935"   # RTMP publish/play
      - "8081:8080"   # HTTP-FLV, matches live.srs.http-base-url
      - "1985:1985"   # SRS HTTP API
    volumes:
      - ./infra/srs/srs.conf:/usr/local/srs/conf/srs.conf:ro
    command:
      - ./objs/srs
      - -c
      - conf/srs.conf

  minio:
    image: minio/minio:latest
    container_name: hangyin-minio
    ports:
      - "9000:9000"    # API
      - "9001:9001"    # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: hangyin-nginx
    ports:
      - "8082:80"    # MinIO public file proxy; 8081 is used by SRS
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - minio
    restart: unless-stopped

volumes:
  minio_data:
