services:
  srs:
    image: ossrs/srs:5
    container_name: hangyin-srs
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "8081:8080"
      - "1985:1985"
    volumes:
      - ./infra/srs/srs.conf:/usr/local/srs/conf/srs.conf:ro
    command:
      - ./objs/srs
      - -c
      - conf/srs.conf
